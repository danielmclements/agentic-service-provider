services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentic_msp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_msp"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: agentic_msp
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"

  api:
    build:
      context: ../..
      dockerfile: apps/api-server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentic_msp
      PORT: 4000
      NODE_ENV: development
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: agentic-msp
      TEMPORAL_NAMESPACE: default
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-example.us.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://agentic-service-provider/api}
      AUTH0_ISSUER: ${AUTH0_ISSUER:-https://example.us.auth0.com/}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-operator-console}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      AUTH0_CALLBACK_URL: ${AUTH0_CALLBACK_URL:-http://localhost:4000/auth/callback}
      AUTH0_LOGOUT_URL: ${AUTH0_LOGOUT_URL:-http://localhost:4000/operator}
      AUTH0_DEFAULT_ORGANIZATION: ${AUTH0_DEFAULT_ORGANIZATION:-acme}
      AUTH0_DEFAULT_CONNECTION: ${AUTH0_DEFAULT_CONNECTION:-}
      AUTH0_JWT_ALGORITHMS: ${AUTH0_JWT_ALGORITHMS:-HS256}
      AUTH0_JWKS_URL: ${AUTH0_JWKS_URL:-}
      AUTH0_JWT_SECRET: ${AUTH0_JWT_SECRET:-dev-auth0-secret}
      AUTH0_JWT_PUBLIC_KEY: ${AUTH0_JWT_PUBLIC_KEY:-}
      AUTH0_PERMISSIONS_CLAIM: ${AUTH0_PERMISSIONS_CLAIM:-permissions}
      AUTH0_ROLES_CLAIM: ${AUTH0_ROLES_CLAIM:-https://agentic-service-provider/roles}
      AUTH0_TENANT_CLAIM: ${AUTH0_TENANT_CLAIM:-https://agentic-service-provider/tenant_id}
      AUTH0_MFA_FRESHNESS_SECONDS: ${AUTH0_MFA_FRESHNESS_SECONDS:-300}
      TRUST_PROXY: ${TRUST_PROXY:-loopback, linklocal, uniquelocal}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-asp_operator_session}
      AUTH_STATE_COOKIE_NAME: ${AUTH_STATE_COOKIE_NAME:-asp_auth_state}
      AUTH_CODE_VERIFIER_COOKIE_NAME: ${AUTH_CODE_VERIFIER_COOKIE_NAME:-asp_auth_code_verifier}
      AUTH_NONCE_COOKIE_NAME: ${AUTH_NONCE_COOKIE_NAME:-asp_auth_nonce}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentic_msp
      NODE_ENV: development
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: agentic-msp
      TEMPORAL_NAMESPACE: default
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-example.us.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://agentic-service-provider/api}
      AUTH0_ISSUER: ${AUTH0_ISSUER:-https://example.us.auth0.com/}
      AUTH0_JWT_ALGORITHMS: ${AUTH0_JWT_ALGORITHMS:-HS256}
      AUTH0_JWKS_URL: ${AUTH0_JWKS_URL:-}
      AUTH0_JWT_SECRET: ${AUTH0_JWT_SECRET:-dev-auth0-secret}
      AUTH0_JWT_PUBLIC_KEY: ${AUTH0_JWT_PUBLIC_KEY:-}
      AUTH0_PERMISSIONS_CLAIM: ${AUTH0_PERMISSIONS_CLAIM:-permissions}
      AUTH0_ROLES_CLAIM: ${AUTH0_ROLES_CLAIM:-https://agentic-service-provider/roles}
      AUTH0_TENANT_CLAIM: ${AUTH0_TENANT_CLAIM:-https://agentic-service-provider/tenant_id}

volumes:
  postgres-data:
