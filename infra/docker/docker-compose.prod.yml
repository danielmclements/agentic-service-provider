services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-agentic_msp}
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agentic_msp}"]
      interval: 10s
      timeout: 5s
      retries: 12

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD_FILE: /run/secrets/postgres_password
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: ${POSTGRES_DB:-agentic_msp}
    secrets:
      - postgres_password

  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: https://${TEMPORAL_DOMAIN}

  api:
    build:
      context: ../..
      dockerfile: apps/api-server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL_FILE: /run/secrets/database_url
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-agentic-msp}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_ISSUER: ${AUTH0_ISSUER}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET_FILE: /run/secrets/auth0_client_secret
      AUTH0_MANAGEMENT_CLIENT_ID: ${AUTH0_MANAGEMENT_CLIENT_ID:-}
      AUTH0_MANAGEMENT_CLIENT_SECRET_FILE: /run/secrets/auth0_management_client_secret
      AUTH0_MANAGEMENT_AUDIENCE: ${AUTH0_MANAGEMENT_AUDIENCE:-}
      AUTH0_PROVISIONING_CONNECTION: ${AUTH0_PROVISIONING_CONNECTION:-}
      AUTH0_CALLBACK_URL: ${AUTH0_CALLBACK_URL}
      AUTH0_LOGOUT_URL: ${AUTH0_LOGOUT_URL}
      AUTH0_DEFAULT_ORGANIZATION: ${AUTH0_DEFAULT_ORGANIZATION:-acme}
      AUTH0_DEFAULT_CONNECTION: ${AUTH0_DEFAULT_CONNECTION:-}
      AUTH0_JWT_ALGORITHMS: ${AUTH0_JWT_ALGORITHMS:-RS256}
      AUTH0_JWKS_URL: ${AUTH0_JWKS_URL:-}
      AUTH0_PERMISSIONS_CLAIM: ${AUTH0_PERMISSIONS_CLAIM:-permissions}
      AUTH0_ROLES_CLAIM: ${AUTH0_ROLES_CLAIM:-https://agentic-service-provider/roles}
      AUTH0_TENANT_CLAIM: ${AUTH0_TENANT_CLAIM:-https://agentic-service-provider/tenant_id}
      AUTH0_MFA_FRESHNESS_SECONDS: ${AUTH0_MFA_FRESHNESS_SECONDS:-300}
      TRUST_PROXY: ${TRUST_PROXY:-loopback, linklocal, uniquelocal}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-asp_operator_session}
      AUTH_STATE_COOKIE_NAME: ${AUTH_STATE_COOKIE_NAME:-asp_auth_state}
      AUTH_CODE_VERIFIER_COOKIE_NAME: ${AUTH_CODE_VERIFIER_COOKIE_NAME:-asp_auth_code_verifier}
      AUTH_NONCE_COOKIE_NAME: ${AUTH_NONCE_COOKIE_NAME:-asp_auth_nonce}
    secrets:
      - database_url
      - auth0_client_secret
      - auth0_management_client_secret
      - openai_api_key
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-agentic-msp}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_ISSUER: ${AUTH0_ISSUER}
      AUTH0_JWT_ALGORITHMS: ${AUTH0_JWT_ALGORITHMS:-RS256}
      AUTH0_JWKS_URL: ${AUTH0_JWKS_URL:-}
      AUTH0_PERMISSIONS_CLAIM: ${AUTH0_PERMISSIONS_CLAIM:-permissions}
      AUTH0_ROLES_CLAIM: ${AUTH0_ROLES_CLAIM:-https://agentic-service-provider/roles}
      AUTH0_TENANT_CLAIM: ${AUTH0_TENANT_CLAIM:-https://agentic-service-provider/tenant_id}
    secrets:
      - database_url
      - openai_api_key

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/opt/backup/backup.sh"]
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_msp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    secrets:
      - postgres_password
    volumes:
      - backups-data:/backups
      - ./postgres-backup:/opt/backup:ro

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      temporal-ui:
        condition: service_started
    environment:
      OPS_DOMAIN: ${OPS_DOMAIN}
      TEMPORAL_DOMAIN: ${TEMPORAL_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
      TEMPORAL_ALLOWED_CIDRS: ${TEMPORAL_ALLOWED_CIDRS}
      TEMPORAL_BASICAUTH_USERNAME: ${TEMPORAL_BASICAUTH_USERNAME}
      TEMPORAL_BASICAUTH_PASSWORD_HASH: ${TEMPORAL_BASICAUTH_PASSWORD_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  backups-data:
  caddy-data:
  caddy-config:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  database_url:
    file: ./secrets/database_url.txt
  auth0_client_secret:
    file: ./secrets/auth0_client_secret.txt
  auth0_management_client_secret:
    file: ./secrets/auth0_management_client_secret.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
